<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Literature Vault — A personal repository for storing, searching, and exploring academic paper summaries.">
  <meta name="theme-color" content="#0a0e1a">
  <title>Literature Vault</title>

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Literature Vault">
  <meta property="og:description" content="AI Paper Summaries — Curated research insights at your fingertips.">
  <meta property="og:image" content="assets/og-thumbnail.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Literature Vault">
  <meta name="twitter:description" content="AI Paper Summaries — Curated research insights at your fingertips.">
  <meta name="twitter:image" content="assets/og-thumbnail.png">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Vendor Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <h1>
        <a href="#home"
          style="color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
          <svg class="brand-logo" width="26" height="26" viewBox="0 0 32 36" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="logo-grad" x1="4" y1="2" x2="28" y2="34" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#6366f1" />
                <stop offset="50%" stop-color="#8b5cf6" />
                <stop offset="100%" stop-color="#a78bfa" />
              </linearGradient>
            </defs>
            <!-- Connections — bulb outline -->
            <line x1="16" y1="3" x2="6" y2="10" stroke="url(#logo-grad)" stroke-width="1" opacity="0.35" />
            <line x1="16" y1="3" x2="26" y2="10" stroke="url(#logo-grad)" stroke-width="1" opacity="0.35" />
            <line x1="6" y1="10" x2="5" y2="20" stroke="url(#logo-grad)" stroke-width="1" opacity="0.35" />
            <line x1="26" y1="10" x2="27" y2="20" stroke="url(#logo-grad)" stroke-width="1" opacity="0.35" />
            <line x1="5" y1="20" x2="12" y2="27" stroke="url(#logo-grad)" stroke-width="1" opacity="0.35" />
            <line x1="27" y1="20" x2="20" y2="27" stroke="url(#logo-grad)" stroke-width="1" opacity="0.35" />
            <!-- Connections — internal network -->
            <line x1="16" y1="3" x2="16" y2="14" stroke="url(#logo-grad)" stroke-width="1" opacity="0.3" />
            <line x1="6" y1="10" x2="16" y2="14" stroke="url(#logo-grad)" stroke-width="1" opacity="0.3" />
            <line x1="26" y1="10" x2="16" y2="14" stroke="url(#logo-grad)" stroke-width="1" opacity="0.3" />
            <line x1="16" y1="14" x2="5" y2="20" stroke="url(#logo-grad)" stroke-width="0.8" opacity="0.2" />
            <line x1="16" y1="14" x2="27" y2="20" stroke="url(#logo-grad)" stroke-width="0.8" opacity="0.2" />
            <line x1="16" y1="14" x2="12" y2="27" stroke="url(#logo-grad)" stroke-width="0.8" opacity="0.2" />
            <line x1="16" y1="14" x2="20" y2="27" stroke="url(#logo-grad)" stroke-width="0.8" opacity="0.2" />
            <!-- Connections — base -->
            <line x1="12" y1="27" x2="20" y2="27" stroke="url(#logo-grad)" stroke-width="1.2" opacity="0.4" />
            <line x1="13" y1="31" x2="19" y2="31" stroke="url(#logo-grad)" stroke-width="1.2" opacity="0.4" />
            <line x1="12" y1="27" x2="13" y2="31" stroke="url(#logo-grad)" stroke-width="1" opacity="0.35" />
            <line x1="20" y1="27" x2="19" y2="31" stroke="url(#logo-grad)" stroke-width="1" opacity="0.35" />
            <!-- Nodes — bulb dome -->
            <circle cx="16" cy="3" r="3" fill="url(#logo-grad)" />
            <circle cx="6" cy="10" r="2.5" fill="url(#logo-grad)" opacity="0.85" />
            <circle cx="26" cy="10" r="2.5" fill="url(#logo-grad)" opacity="0.85" />
            <circle cx="5" cy="20" r="2" fill="url(#logo-grad)" opacity="0.7" />
            <circle cx="27" cy="20" r="2" fill="url(#logo-grad)" opacity="0.7" />
            <!-- Node — center (bright core) -->
            <circle cx="16" cy="14" r="3.5" fill="url(#logo-grad)" />
            <!-- Nodes — base -->
            <circle cx="12" cy="27" r="2" fill="url(#logo-grad)" opacity="0.6" />
            <circle cx="20" cy="27" r="2" fill="url(#logo-grad)" opacity="0.6" />
            <circle cx="13" cy="31" r="1.5" fill="url(#logo-grad)" opacity="0.45" />
            <circle cx="19" cy="31" r="1.5" fill="url(#logo-grad)" opacity="0.45" />
          </svg>
          Literature Vault
        </a>
      </h1>
    </div>

    <ul class="sidebar-nav">

      <li>
        <a href="#papers">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          Papers
        </a>
      </li>
      <li>
        <a href="#tags">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
            <line x1="7" y1="7" x2="7.01" y2="7" />
          </svg>
          Tags & Stats
        </a>
    </ul>

    <div class="sidebar-footer">
      <p>Eppur si muove</p>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <header class="content-header">
      <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <h2 id="content-title">Papers</h2>

      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="search-input" placeholder="Search papers by title, author, tag, or keyword..."
          aria-label="Search papers">
      </div>
    </header>

    <!-- Content Area -->
    <div id="content-body" class="content-body">
      <!-- Dynamic content rendered by JS modules -->
    </div>
  </div>

  <!-- App Script -->
  <script type="module" src="js/app.js"></script>

</body>

</html>
